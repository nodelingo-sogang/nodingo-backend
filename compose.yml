services:
  postgres:
    image: postgres:16-alpine
    container_name: nodingo-postgres
    environment:
      POSTGRES_DB: nodingo
      POSTGRES_USER: nodingo_user
      POSTGRES_PASSWORD: 20200129
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nodingo-redis
    ports:
      - "6379:6379"